<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda — RezTored Page</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Rajdhani', sans-serif; }
  .titulo { font-family: 'Orbitron', sans-serif; }
  .card-producto {
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .card-producto:hover {
    transform: translateY(-4px);
    border-color: #6366f1;
    box-shadow: 0 10px 30px -12px rgba(99,102,241,.5);
  }
  .hidden-imp { display:none !important; }
</style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center px-6 py-16">

  <a href="https://reztored.online" class="mb-4">
    <img src="../lol.png" alt="Inicio" class="w-16 h-16 rounded-full border border-gray-700">
  </a>

  <div class="flex items-center gap-4 mb-6 text-sm">
    <a href="/fun" class="text-gray-400 hover:text-white transition">&larr; Volver a FUN</a>
  </div>

  <div class="text-center mb-3">
    <span class="hidden items-center gap-1.5 bg-gray-900 border border-gray-800 rounded-full pl-1 pr-3 py-1" id="coins-badge">
      <img src="/petocoin.png" alt="petoCoins" class="h-5 w-5">
      <span class="text-sm font-bold" id="coins-amount">0</span>
    </span>
  </div>

  <h1 class="titulo text-3xl md:text-4xl font-black mb-2 text-center">🛒 Tienda</h1>
  <p class="text-gray-400 mb-10 text-center max-w-md">Canjeá tus petoCoins por cosas lindas.</p>

  <div id="sin-sesion" class="hidden-imp text-center mt-4">
    <p class="text-gray-300 mb-2">Necesitás iniciar sesión para comprar.</p>
    <a href="/" class="text-indigo-400 hover:underline">Ir a RezTored e iniciar sesión →</a>
  </div>

  <div id="grid-productos" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-4xl"></div>

  <p id="tienda-error" class="hidden-imp text-red-400 text-sm text-center mt-6"></p>

  <a href="https://reztored.online" class="mt-14 text-sm text-gray-500 hover:text-gray-300 transition">&larr; Volver al inicio</a>

  <script type="module">
    import { auth, db, comprarProducto } from '../reztored-auth.js';
    import { onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { PRODUCTOS } from './productos.js';

    const $ = (id) => document.getElementById(id);
    const coinsBadge = $('coins-badge');
    const coinsAmount = $('coins-amount');
    const sinSesion = $('sin-sesion');
    const grid = $('grid-productos');
    const errorMsg = $('tienda-error');

    let saldoActual = 0;
    let inventarioActual = {};
    let hayUsuario = false;

    function mostrarError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden-imp');
      setTimeout(() => errorMsg.classList.add('hidden-imp'), 4000);
    }

    function renderProductos() {
      grid.innerHTML = '';
      PRODUCTOS.forEach(producto => {
        const cantidad = inventarioActual[producto.id] || 0;
        const yaLoTiene = producto.tipo === 'unico' && cantidad > 0;
        const noAlcanza = hayUsuario && saldoActual < producto.precio;
        const deshabilitado = !hayUsuario || yaLoTiene || noAlcanza;

        let textoBoton = 'Comprar';
        if (!hayUsuario) textoBoton = 'Iniciá sesión';
        else if (yaLoTiene) textoBoton = 'Ya lo tenés ✓';
        else if (noAlcanza) textoBoton = 'Te faltan coins';
        else if (producto.tipo === 'multiple' && cantidad > 0) textoBoton = `Comprar (tenés ${cantidad})`;

        const card = document.createElement('div');
        card.className = 'card-producto bg-gray-900 border border-gray-800 rounded-2xl p-6 flex flex-col items-center text-center';
        card.innerHTML = `
          <div class="text-6xl mb-3">${producto.emoji}</div>
          <h2 class="titulo text-lg font-bold mb-1">${producto.nombre}</h2>
          <p class="text-gray-400 text-sm mb-4">${producto.descripcion}</p>
          <div class="flex items-center gap-1.5 mb-4">
            <img src="/petocoin.png" alt="petoCoins" class="h-5 w-5">
            <span class="font-bold text-yellow-400">${producto.precio}</span>
          </div>
          <button
            class="btn-comprar w-full rounded-lg py-2.5 font-bold transition ${
              deshabilitado
                ? 'bg-gray-800 text-gray-500 cursor-not-allowed'
                : 'bg-indigo-600 hover:bg-indigo-500 text-white'
            }"
            data-id="${producto.id}"
            ${deshabilitado ? 'disabled' : ''}
          >${textoBoton}</button>
        `;
        grid.appendChild(card);
      });

      grid.querySelectorAll('.btn-comprar').forEach(btn => {
        btn.addEventListener('click', async () => {
          const producto = PRODUCTOS.find(p => p.id === btn.dataset.id);
          if (!producto) return;
          btn.disabled = true;
          try {
            await comprarProducto(producto);
            // No hace falta re-renderizar a mano: el onSnapshot del
            // usuario trae el saldo/inventario actualizado y llama a
            // renderProductos() solo.
          } catch (e) {
            mostrarError(e.message);
            btn.disabled = false;
          }
        });
      });
    }

    auth.onAuthStateChanged(user => {
      hayUsuario = !!user;
      sinSesion.classList.toggle('hidden-imp', hayUsuario);

      if (user) {
        coinsBadge.classList.remove('hidden');
        coinsBadge.classList.add('flex');
        onSnapshot(doc(db, 'users', user.uid), (snap) => {
          const data = snap.exists() ? snap.data() : {};
          saldoActual = data.coins || 0;
          inventarioActual = data.inventario || {};
          coinsAmount.textContent = saldoActual;
          renderProductos();
        });
      } else {
        coinsBadge.classList.add('hidden');
        saldoActual = 0;
        inventarioActual = {};
        renderProductos();
      }
    });

    // Primer render (por si tarda en resolver el estado de auth)
    renderProductos();
  </script>

</body>
</html>
