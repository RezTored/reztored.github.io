<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-page: #121214;
            --bg-card: #1e1e22;
            --bg-header: #18181c;
            --border-color: #2d2d34;
            --text-main: #e1e1e6;
            --text-muted: #8e8e93;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-page);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page-container { width: 100%; max-width: 480px; }

        .app-window {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        .window-header {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .window-dots { display: flex; gap: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .dot.close { background: #ff5f56; }
        .dot.minimize { background: #ffbd2e; }
        .dot.maximize { background: #27c93f; }

        .window-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .window-home-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 49px;
            height: 22px;
            text-decoration: none;
            opacity: 0.75;
            transition: opacity 0.2s, transform 0.2s;
        }
        .window-home-btn:hover { opacity: 1; transform: scale(1.08); }
        .window-home-btn img { height: 20px; width: auto; display: block; }

        .window-content {
            padding: 30px 24px;
            text-align: center;
        }

        .contact-msg {
            font-size: 1.1rem;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .discord-box {
            margin-top: 22px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 18px;
            text-decoration: none;
            font-family: inherit;
            cursor: pointer;
            transition: border-color .2s, transform .2s;
            width: 100%;
            max-width: 260px;
        }
        .discord-box:hover {
            border-color: #5865F2;
            transform: translateY(-2px);
        }
        .discord-box svg { width: 22px; height: 22px; fill: #5865F2; flex-shrink: 0; }
        .discord-box .discord-text { text-align: left; }
        .discord-box .discord-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .discord-box .discord-user {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-white);
        }

        .instagram-box {
            margin-top: 14px;
        }
        .instagram-box:hover {
            border-color: #E1306C;
        }
        .instagram-box svg { fill: #E1306C; }

        .whatsapp-box {
            margin-top: 14px;
        }
        .whatsapp-box:hover {
            border-color: #25D366;
        }
        .whatsapp-box svg { fill: #25D366; }

        .contact-links {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="app-window">
        <div class="window-header">
            <div class="window-dots">
                <span class="dot close"></span>
                <span class="dot minimize"></span>
                <span class="dot maximize"></span>
            </div>
            <div class="window-title">Contacto</div>
            <a href="/" class="window-home-btn" aria-label="Volver al inicio" title="Volver al inicio">
                <img src="/lol.png" alt="Inicio">
            </a>
        </div>
        <div class="window-content">
            <p class="contact-msg">Contactar a RezTored</p>

            <div class="contact-links">
                <button class="discord-box" id="discord-copy" type="button">

                    <span class="discord-text">
                        <span class="discord-label">Discord (tocá para copiar)</span>
                        <span class="discord-user" id="discord-user">@reztored</span>
                    </span>
                </button>

                <a class="discord-box instagram-box" href="https://www.instagram.com/reztored_/" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                    <span class="discord-text">
                        <span class="discord-label">Instagram</span>
                        <span class="discord-user">@reztored_</span>
                    </span>
                </a>

                <button class="discord-box whatsapp-box" id="whatsapp-copy" type="button">

                    <span class="discord-text">
                        <span class="discord-label">WhatsApp (tocá para copiar)</span>
                        <span class="discord-user" id="whatsapp-user">@reztored</span>
                    </span>
                </button>
            </div>
        </div>

        <script>
            const discordBtn = document.getElementById('discord-copy');
            const discordUserSpan = document.getElementById('discord-user');
            discordBtn.addEventListener('click', () => {
                navigator.clipboard.writeText('@reztored').then(() => {
                    const original = discordUserSpan.textContent;
                    discordUserSpan.textContent = '¡Copiado!';
                    setTimeout(() => { discordUserSpan.textContent = original; }, 1500);
                });
            });

            const whatsappBtn = document.getElementById('whatsapp-copy');
            const whatsappUserSpan = document.getElementById('whatsapp-user');
            whatsappBtn.addEventListener('click', () => {
                navigator.clipboard.writeText('+54 9 11 3915-1146').then(() => {
                    const original = whatsappUserSpan.textContent;
                    whatsappUserSpan.textContent = '¡Copiado!';
                    setTimeout(() => { whatsappUserSpan.textContent = original; }, 1500);
                });
            });
        </script>
    </div>
</div>

</body>
</html>
