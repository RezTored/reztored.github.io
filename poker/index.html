<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker — Casino RezTored</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Rajdhani', sans-serif; }
  .titulo { font-family: 'Orbitron', sans-serif; }
  .mesa {
    background: radial-gradient(ellipse at center, #0f5132 0%, #0a3d26 70%, #062919 100%);
    border: 10px solid #3a2416;
    box-shadow: inset 0 0 60px rgba(0,0,0,.6), 0 10px 40px rgba(0,0,0,.5);
  }
  .carta {
    width: 42px; height: 60px; border-radius: 6px; background: #fff; color: #111;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size: 1.1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); flex-shrink:0;
  }
  .carta.dorso { background: repeating-linear-gradient(45deg,#4338ca,#4338ca 6px,#3730a3 6px,#3730a3 12px); }
  .carta.roja { color:#dc2626; }
  .asiento { transition: all .2s ease; }
  .asiento.turno { box-shadow: 0 0 0 3px #fbbf24, 0 0 20px rgba(251,191,36,.6); }
  .asiento.plegado { opacity: .4; }
  .hidden-imp { display:none !important; }
</style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center px-4 py-8">

  <a href="/fun" class="mb-4 flex items-center gap-2 text-gray-400 hover:text-white transition text-sm">
    <img src="lol.png" class="w-8 h-8 rounded-full border border-gray-700"> &larr; FUN
  </a>

  <div id="sin-sesion" class="hidden-imp text-center mt-10">
    <p class="text-lg text-gray-300 mb-2">Necesitás iniciar sesión para jugar al poker.</p>
    <a href="/" class="text-indigo-400 hover:underline">Ir a RezTored e iniciar sesión →</a>
  </div>

  <!-- ===================== LOBBY ===================== -->
  <div id="vista-lobby" class="hidden-imp w-full max-w-md flex flex-col gap-8 mt-6">

    <h1 class="titulo text-2xl font-black text-center">🃏 Poker Online</h1>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
      <h2 class="titulo text-sm font-bold text-indigo-400 mb-4 tracking-widest">CREAR SALA</h2>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <label class="text-xs text-gray-400">Ciega chica
          <input id="input-sb" type="number" value="10" min="1" class="w-full mt-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
        </label>
        <label class="text-xs text-gray-400">Ciega grande
          <input id="input-bb" type="number" value="20" min="2" class="w-full mt-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
        </label>
      </div>
      <label class="text-xs text-gray-400 block mb-3">Buy-in (petoCoins que llevás a la mesa)
        <input id="input-buyin-crear" type="number" value="500" min="20" class="w-full mt-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
      </label>
      <button id="btn-crear" class="w-full bg-indigo-600 hover:bg-indigo-500 transition rounded-lg py-3 font-bold">Crear sala nueva</button>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
      <h2 class="titulo text-sm font-bold text-indigo-400 mb-4 tracking-widest">UNIRSE CON CÓDIGO</h2>
      <input id="input-codigo" maxlength="5" placeholder="Ej: A7K2Q" class="w-full mb-3 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white text-center tracking-[0.3em] uppercase font-bold">
      <label class="text-xs text-gray-400 block mb-3">Buy-in (petoCoins)
        <input id="input-buyin-unir" type="number" value="500" min="20" class="w-full mt-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
      </label>
      <button id="btn-unirse" class="w-full bg-gray-700 hover:bg-gray-600 transition rounded-lg py-3 font-bold">Unirme a la sala</button>
    </div>

    <p id="lobby-error" class="hidden-imp text-red-400 text-sm text-center"></p>
    <p class="text-center text-xs text-gray-500">Tus petoCoins se descuentan al sentarte y se te devuelven cuando te levantás de la mesa (entre manos).</p>
  </div>

  <!-- ===================== MESA ===================== -->
  <div id="vista-mesa" class="hidden-imp w-full max-w-4xl flex flex-col items-center gap-4">

    <div class="flex items-center gap-3 flex-wrap justify-center">
      <span class="text-xs text-gray-400">Sala:</span>
      <span id="codigo-sala" class="titulo font-bold text-lg tracking-widest text-yellow-400"></span>
      <button id="btn-copiar-codigo" class="text-xs bg-gray-800 border border-gray-700 rounded px-2 py-1 hover:bg-gray-700">Copiar</button>
      <span class="text-xs text-gray-500">·</span>
      <span id="ciegas-info" class="text-xs text-gray-400"></span>
      <button id="btn-salir-mesa" class="text-xs text-red-400 hover:text-red-300 ml-2">Levantarme de la mesa</button>
    </div>

    <div class="mesa rounded-[50%] w-full aspect-[16/10] relative flex items-center justify-center">

      <!-- centro: comunitarias + pozo -->
      <div class="flex flex-col items-center gap-2 z-10">
        <div id="cartas-comunitarias" class="flex gap-1.5"></div>
        <div class="titulo text-sm font-bold bg-black/40 rounded-full px-4 py-1">
          Pozo: <span id="pozo" class="text-yellow-400">0</span>
        </div>
        <div id="fase-actual" class="text-[10px] uppercase tracking-widest text-gray-300"></div>
        <div id="resultado-mano" class="text-xs text-green-400 font-bold text-center max-w-xs"></div>
      </div>

      <!-- asientos -->
      <div id="asientos" class="absolute inset-0"></div>
    </div>

    <!-- mi mano -->
    <div class="flex items-center gap-4">
      <div id="mis-cartas" class="flex gap-1.5"></div>
      <div id="mis-coins-mesa" class="titulo text-sm text-yellow-400 font-bold"></div>
    </div>

    <!-- controles -->
    <div id="panel-controles" class="hidden-imp flex flex-col items-center gap-3 w-full max-w-md">
      <div id="panel-accion" class="flex gap-2 justify-center flex-wrap">
        <button id="btn-fold" class="bg-red-600 hover:bg-red-500 px-5 py-2.5 rounded-lg font-bold">Retirarse</button>
        <button id="btn-check" class="bg-gray-700 hover:bg-gray-600 px-5 py-2.5 rounded-lg font-bold">Pasar</button>
        <button id="btn-call" class="bg-blue-600 hover:bg-blue-500 px-5 py-2.5 rounded-lg font-bold">Igualar</button>
        <div class="flex items-center gap-2">
          <input id="input-raise" type="number" class="w-24 bg-gray-800 border border-gray-700 rounded px-2 py-2 text-center">
          <button id="btn-raise" class="bg-yellow-600 hover:bg-yellow-500 px-5 py-2.5 rounded-lg font-bold">Subir</button>
        </div>
      </div>
    </div>

    <button id="btn-iniciar-mano" class="hidden-imp bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-lg font-bold titulo text-sm">▶ Repartir mano</button>
    <p id="espera-msg" class="hidden-imp text-gray-400 text-sm text-center"></p>
    <p id="mesa-error" class="hidden-imp text-red-400 text-sm text-center"></p>
  </div>

  <script type="module">
    import { auth, db } from '../../reztored-auth.js';
    import { onSnapshot, doc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
        crearSala, unirseSala, salirDeMesa, suscribirseASala, miMano,
        iniciarMano, accion, escucharComoHost, revelarMano
    } from './poker.js';

    let codigoActual = null;
    let unsubSala = null;
    let unsubHost = null;
    let unsubReveals = null;
    let ultimaSala = null;
    let cartasMano = null;
    let yaRevele = false;
    let cartasReveladas = {}; // uid -> cartas, se llena en showdown

    const $ = (id) => document.getElementById(id);

    function pintarCarta(carta, oculta = false) {
      const div = document.createElement('div');
      if (oculta) { div.className = 'carta dorso'; return div; }
      const roja = carta.palo === '♥' || carta.palo === '♦';
      div.className = 'carta' + (roja ? ' roja' : '');
      div.innerHTML = `${carta.simbolo}<span style="font-size:.8em">${carta.palo}</span>`;
      return div;
    }

    // --- Auth gate ---
    auth.onAuthStateChanged(user => {
      if (!user) {
        $('sin-sesion').classList.remove('hidden-imp');
        $('vista-lobby').classList.add('hidden-imp');
        $('vista-mesa').classList.add('hidden-imp');
        return;
      }
      $('sin-sesion').classList.add('hidden-imp');
      if (!codigoActual) $('vista-lobby').classList.remove('hidden-imp');
    });

    function mostrarErrorLobby(msg) {
      const el = $('lobby-error');
      el.textContent = msg; el.classList.remove('hidden-imp');
    }
    function mostrarErrorMesa(msg) {
      const el = $('mesa-error');
      el.textContent = msg; el.classList.remove('hidden-imp');
      setTimeout(() => el.classList.add('hidden-imp'), 4000);
    }

    $('btn-crear').addEventListener('click', async () => {
      $('lobby-error').classList.add('hidden-imp');
      try {
        const sb = parseInt($('input-sb').value) || 10;
        const bb = parseInt($('input-bb').value) || 20;
        const buyIn = parseInt($('input-buyin-crear').value) || 500;
        const code = await crearSala({ smallBlind: sb, bigBlind: bb, buyIn });
        entrarASala(code);
      } catch (e) { mostrarErrorLobby(e.message); }
    });

    $('btn-unirse').addEventListener('click', async () => {
      $('lobby-error').classList.add('hidden-imp');
      try {
        const code = $('input-codigo').value.trim().toUpperCase();
        if (!code) throw new Error('Poné un código de sala.');
        const buyIn = parseInt($('input-buyin-unir').value) || 500;
        await unirseSala(code, buyIn);
        entrarASala(code);
      } catch (e) { mostrarErrorLobby(e.message); }
    });

    $('btn-copiar-codigo').addEventListener('click', () => {
      navigator.clipboard?.writeText(codigoActual);
      const b = $('btn-copiar-codigo');
      b.textContent = '¡Copiado!';
      setTimeout(() => b.textContent = 'Copiar', 1500);
    });

    $('btn-salir-mesa').addEventListener('click', async () => {
      try {
        await salirDeMesa(codigoActual);
        salirDeVistaMesa();
      } catch (e) { mostrarErrorMesa(e.message); }
    });

    $('btn-iniciar-mano').addEventListener('click', async () => {
      try { await iniciarMano(codigoActual); } catch (e) { mostrarErrorMesa(e.message); }
    });

    $('btn-fold').addEventListener('click', () => ejecutarAccion('fold'));
    $('btn-check').addEventListener('click', () => ejecutarAccion('check'));
    $('btn-call').addEventListener('click', () => ejecutarAccion('call'));
    $('btn-raise').addEventListener('click', () => ejecutarAccion('raise', parseInt($('input-raise').value)));

    async function ejecutarAccion(tipo, monto) {
      try { await accion(codigoActual, tipo, monto); } catch (e) { mostrarErrorMesa(e.message); }
    }

    function entrarASala(code) {
      codigoActual = code;
      history.replaceState(null, '', `?sala=${code}`);
      $('vista-lobby').classList.add('hidden-imp');
      $('vista-mesa').classList.remove('hidden-imp');
      $('codigo-sala').textContent = code;

      unsubSala = suscribirseASala(code, renderSala);
      unsubHost = escucharComoHost(code);
      unsubReveals = onSnapshot(collection(db, 'pokerRooms', code, 'reveals'), (snap) => {
        cartasReveladas = {};
        snap.docs.forEach(d => { cartasReveladas[d.id] = d.data().cards; });
        if (ultimaSala) renderSala(ultimaSala);
      });
    }

    function salirDeVistaMesa() {
      unsubSala?.(); unsubHost?.(); unsubReveals?.();
      codigoActual = null; ultimaSala = null; cartasMano = null; yaRevele = false; cartasReveladas = {};
      history.replaceState(null, '', location.pathname);
      $('vista-mesa').classList.add('hidden-imp');
      $('vista-lobby').classList.remove('hidden-imp');
    }

    async function renderSala(sala) {
      if (!sala) { mostrarErrorMesa('La sala se cerró.'); salirDeVistaMesa(); return; }
      ultimaSala = sala;
      const user = auth.currentUser;
      if (!user) return;

      $('ciegas-info').textContent = `Ciegas ${sala.smallBlind}/${sala.bigBlind}`;
      $('pozo').textContent = sala.pot;
      $('fase-actual').textContent = ({
        waiting: 'Esperando jugadores', preflop: 'Pre-flop', flop: 'Flop', turn: 'Turn',
        river: 'River', showdown: 'Mostrando cartas', hand_over: 'Mano terminada'
      })[sala.phase] || '';
      $('resultado-mano').textContent = sala.resultMessage || '';

      // comunitarias
      const contComunes = $('cartas-comunitarias');
      contComunes.innerHTML = '';
      sala.communityCards.forEach(c => contComunes.appendChild(pintarCarta(c)));

      // asientos
      const cont = $('asientos');
      cont.innerHTML = '';
      const n = sala.players.length;
      const radioX = 44, radioY = 40;
      sala.players.forEach((p, i) => {
        const angulo = (Math.PI * 2 * i) / n - Math.PI / 2;
        const x = 50 + radioX * Math.cos(angulo);
        const y = 50 + radioY * Math.sin(angulo);

        const div = document.createElement('div');
        div.className = 'asiento absolute -translate-x-1/2 -translate-y-1/2 bg-gray-900/90 border border-gray-700 rounded-xl px-3 py-2 flex flex-col items-center gap-1 min-w-[92px]';
        div.style.left = x + '%'; div.style.top = y + '%';
        if (i === sala.turnIndex) div.classList.add('turno');
        if (p.status === 'folded') div.classList.add('plegado');

        const esYo = p.uid === user.uid;
        const cartasDeP = cartasReveladas[p.uid];
        const mostrarCartasEnAsiento = cartasDeP && ['showdown', 'hand_over'].includes(sala.phase) && !esYo;
        const cartasHtml = mostrarCartasEnAsiento
          ? `<div class="flex gap-0.5 mt-1">${cartasDeP.map(c => {
              const roja = c.palo === '♥' || c.palo === '♦';
              return `<div class="carta${roja ? ' roja' : ''}" style="width:26px;height:38px;font-size:.65rem">${c.simbolo}<span style="font-size:.8em">${c.palo}</span></div>`;
            }).join('')}</div>`
          : '';
        div.innerHTML = `
          <div class="flex items-center gap-1">
            ${p.photoURL ? `<img src="${p.photoURL}" class="w-6 h-6 rounded-full">` : ''}
            <span class="text-xs font-bold ${esYo ? 'text-yellow-400' : 'text-white'}">${p.username}${p.uid === sala.hostUid ? ' 👑' : ''}</span>
          </div>
          <span class="text-[11px] text-green-400 font-bold">${p.tableChips} 🪙</span>
          ${p.currentBet > 0 ? `<span class="text-[10px] text-blue-300">apostó ${p.currentBet}</span>` : ''}
          <span class="text-[10px] text-gray-400 uppercase">${({active:'',allin:'ALL-IN',folded:'se retiró',sitout:'sentado'})[p.status] || ''}</span>
          ${cartasHtml}
        `;
        cont.appendChild(div);
      });

      // mis fichas
      const yo = sala.players.find(p => p.uid === user.uid);
      $('mis-coins-mesa').textContent = yo ? `Tus fichas: ${yo.tableChips}` : '';

      // mi mano
      const contMano = $('mis-cartas');
      const jugando = yo && (yo.status === 'active' || yo.status === 'allin');
      if (jugando && ['preflop','flop','turn','river','showdown','hand_over'].includes(sala.phase)) {
        if (!cartasMano) cartasMano = await miMano(codigoActual);
        contMano.innerHTML = '';
        (cartasMano || []).forEach(c => contMano.appendChild(pintarCarta(c)));
      } else if (sala.phase === 'waiting' || sala.phase === 'lobby') {
        cartasMano = null;
        contMano.innerHTML = '';
      }

      // botón iniciar mano (solo host, entre manos)
      const puedeIniciar = user.uid === sala.hostUid &&
        (sala.phase === 'waiting' || sala.phase === 'hand_over') &&
        sala.players.filter(p => p.tableChips > 0).length >= 2;
      $('btn-iniciar-mano').classList.toggle('hidden-imp', !puedeIniciar);

      $('btn-salir-mesa').classList.toggle('hidden-imp', ['preflop','flop','turn','river','showdown'].includes(sala.phase));

      if (!puedeIniciar && (sala.phase === 'waiting' || sala.phase === 'hand_over')) {
        $('espera-msg').classList.remove('hidden-imp');
        $('espera-msg').textContent = sala.players.filter(p=>p.tableChips>0).length < 2
          ? 'Esperando a que se siente otro jugador con fichas...'
          : (user.uid === sala.hostUid ? '' : 'Esperando a que el creador de la sala reparta...');
      } else {
        $('espera-msg').classList.add('hidden-imp');
      }

      // panel de acciones
      const esMiTurno = yo && sala.turnIndex === sala.players.findIndex(p => p.uid === user.uid) &&
        ['preflop','flop','turn','river'].includes(sala.phase);
      $('panel-controles').classList.toggle('hidden-imp', !(esMiTurno || (sala.phase === 'showdown' && jugando)));
      $('panel-accion').classList.toggle('hidden-imp', !esMiTurno);

      if (esMiTurno) {
        const puedePasar = yo.currentBet === sala.currentBet;
        $('btn-check').classList.toggle('hidden-imp', !puedePasar);
        $('btn-call').classList.toggle('hidden-imp', puedePasar);
        $('btn-call').textContent = `Igualar (${sala.currentBet - yo.currentBet})`;
        $('input-raise').value = sala.currentBet + sala.minRaise;
        $('input-raise').min = sala.currentBet + sala.minRaise;
      }

      // auto-revelar en showdown (todos los que siguen en la mano)
      if (sala.phase === 'showdown' && jugando && !yaRevele) {
        yaRevele = true; // marcar antes de la llamada async para no duplicar
        try { await revelarMano(codigoActual); } catch (e) { yaRevele = false; }
      }
      if (sala.phase !== 'showdown') yaRevele = false;
    }

    // Si venimos de un link con ?sala=CODIGO, precargamos el input
    const params = new URLSearchParams(location.search);
    if (params.get('sala')) $('input-codigo').value = params.get('sala').toUpperCase();
  </script>

<script type="module" src="/nivel-widget.js"></script>
</body>
</html>
