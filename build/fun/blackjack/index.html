<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack con Petocoins</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        
        <div class="header-container">
            <a href="../../index.html" class="btn-back">⬅ Volver al Inicio</a>
            <h1>Blackjack</h1>
        </div>
        
        <div class="betting-area">
            <div class="balance-display">
                Saldo: <span id="petocoins-balance">0</span> 
                <img src="petocoin.png" class="petocoin-icon" alt="Petocoin">
            </div>
            <div class="bet-controls">
                <label for="bet-amount">Apuesta</label>
                <input type="number" id="bet-amount" value="50" min="10" step="10">
                <button id="btn-max" class="btn-small">MÁX</button>
            </div>
        </div>

        <div class="table">
            <div id="dealer-area">
                <h2>Crupier: <span id="dealer-score">0</span></h2>
                <div id="dealer-cards" class="cards"></div>
            </div>
            
            <div id="player-area">
                <h2>Jugador: <span id="player-score">0</span></h2>
                <div id="player-cards" class="cards"></div>
            </div>
        </div>

        <h2 id="message">Cargando saldo de Firebase...</h2>
        
        <div class="controls">
            <button id="btn-deal" class="btn">Repartir</button>
            <button id="btn-hit" class="btn" disabled>Pedir Carta</button>
            <button id="btn-stand" class="btn" disabled>Plantarse</button>
        </div>
    </div>

    <script type="module" src="blackjack.js"></script>
</body>
</html>
