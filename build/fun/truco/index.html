<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Truco — RezTored</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background: #0f172a; color: white; }
        .titulo { font-family: 'Orbitron', sans-serif; }
        .mesa { background: radial-gradient(ellipse at center, #064e3b 0%, #064e3b 70%, #022c22 100%); border: 10px solid #3a2416; }
    </style>
</head>
<body class="p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="titulo text-center text-4xl mb-8">TRUCO ARGENTINO</h1>
        <div id="lobby" class="bg-gray-900 p-6 rounded-xl border border-gray-800">
            <button id="btn-crear" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded mb-4">Crear Sala</button>
            <input id="input-code" placeholder="Código de 5 letras" class="w-full bg-gray-800 p-3 rounded mb-2 text-center uppercase">
            <button id="btn-unir" class="w-full bg-green-700 py-3 rounded">Unirse a Sala</button>
        </div>
        <div id="mesa" class="hidden mesa p-8 rounded-2xl min-h-[500px]">
            </div>
    </div>
    <script type="module" src="truco.js"></script>
</body>
</html>
