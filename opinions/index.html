<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Opiniones</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* Paleta de colores basada en tu estilo */
        :root {
            --bg-page: #121214;          /* Gris ultra oscuro mate */
            --bg-card: #1e1e22;          /* Gris oscuro para ventana flotante */
            --bg-header: #18181c;        /* Gris más oscuro para barra superior */
            --border-color: #2d2d34;     /* Borde sutil */
            --text-main: #e1e1e6;        /* Blanco/Gris claro */
            --text-muted: #8e8e93;       /* Gris intermedio */
            --text-white: #ffffff;
            --accent-red: #ff5f56;       /* Color de destaque para "YOU" */
            --primary: #4f46e5;          /* Botón principal (Indigo/Violeta) */
            --primary-hover: #4338ca;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Estilo general del Body */
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-page); 
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        /* Ventana Flotante del Foro (Estilo de tu App) */
        .app-window {
            width: 100%;
            max-width: 500px; 
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255, 255, 255, 0.02);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .app-window:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.75), 0 0 20px rgba(255, 255, 255, 0.04);
        }

        /* Barra superior de control (Estilo Mac/SO) */
        .window-header {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .window-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.close { background: #ff5f56; }
        .dot.minimize { background: #ffbd2e; }
        .dot.maximize { background: #27c93f; }

        .window-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .window-spacer {
            width: 49px; 
        }

        /* Contenedor del interior de la ventana */
        .window-content {
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Cabecera del Foro */
        .forum-banner {
            text-align: center;
            margin-bottom: 24px;
        }

        .forum-banner p.hate-all {
            font-family: monospace;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .forum-banner h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--text-white);
            letter-spacing: 1.5px;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .forum-banner h1 span {
            color: var(--accent-red);
            text-shadow: 0 0 8px rgba(255, 95, 86, 0.4);
        }

        /* Clases CSS de estado */
        .status-online {
            color: #27c93f;
            font-weight: bold;
        }

        .status-offline {
            color: #ff5f56;
            font-weight: bold;
        }

        /* Barra de estado de usuario */
        .auth-status-bar {
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .auth-status-bar .user-info-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .auth-status-bar .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
        }

        .auth-status-bar a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .auth-status-bar a:hover {
            color: var(--text-white);
            text-decoration: underline;
        }

        /* Formulario para publicar opiniones */
        .publish-box {
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .publish-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--text-white);
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            resize: none;
            min-height: 80px;
            outline: none;
            margin-bottom: 10px;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            border-color: #5d5d66;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: #2d2d34;
            color: var(--text-white);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: #3e3e46;
            border-color: #5d5d66;
        }

        /* Alerta de requerimiento de login */
        .login-alert {
            background: var(--bg-header);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-alert p {
            color: var(--text-muted);
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .login-alert button {
            background: #2d2d34;
            color: var(--text-white);
        }

        /* Contenedor del Feed */
        .opinions-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opinion-card {
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .opinion-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 6px;
        }

        .author-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .opinion-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }

        .opinion-author {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-white);
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
        }

        .opinion-date {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .opinion-body {
            font-size: 0.95rem;
            color: var(--text-main);
            white-space: pre-line;
            letter-spacing: 0.5px;
        }

        .no-opinions {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
        }

        /* --- MODAL DE AUTENTICACIÓN --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-body h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--text-white);
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-white);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #5d5d66;
        }

        .hidden {
            display: none !important;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-full {
            width: 100%;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
        }

        .btn-google {
            background: #ffffff;
            color: #000000;
            border: none;
        }

        .btn-google:hover {
            background: #e1e1e6;
        }

        .modal-footer-text {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 15px;
        }

        .modal-footer-text a {
            color: var(--text-white);
            text-decoration: none;
            font-weight: bold;
        }

        .modal-footer-text a:hover {
            text-decoration: underline;
        }

        .text-message {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
        }

        /* Colores de estado del feedback del modal */
        .text-green-400 { color: #27c93f; }
        .text-red-400 { color: #ff5f56; }
        .text-gray-300 { color: #e1e1e6; }

        .window-content::-webkit-scrollbar {
            width: 6px;
        }
        .window-content::-webkit-scrollbar-track {
            background: var(--bg-card);
        }
        .window-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="app-window">
        
        <div class="window-header">
            <div class="window-dots">
                <span class="dot close"></span>
                <span class="dot minimize"></span>
                <span class="dot maximize"></span>
            </div>
            <div class="window-title">Opiniones</div>
            <div class="window-spacer"></div>
        </div>

        <div class="window-content">
            
            <div class="forum-banner">
                <p class="hate-all">i hate all lul</p>
                <h1>all, but <span>YOU</span> no.</h1>
                <h2>lol</h2>
            </div>

            <div class="auth-status-bar" id="auth-status-bar">
                <div class="user-info-wrapper">
                    <img id="user-avatar-menu" class="user-avatar hidden" src="" alt="avatar">
                    <span id="user-logged-in" class="hidden">
                        ONLINE: <a href="#" id="user-profile-link" class="status-online">Mi Perfil</a>
                    </span>
                    <button id="btn-login-menu" style="background:none; border:none; padding:0; text-decoration:underline;">STATUS: <span class="status-offline">DESCONECTADO (HACÉ CLIC ACÁ)</span></button>
                </div>
                <div>
                    <a href="https://reztored.online/" id="logo-inicio">INICIO</a>
                    <span id="auth-links" style="margin-left: 10px;">
                        <a href="#" id="btn-logout" class="hidden" style="color: #ff5f56;">LOGOUT</a>
                    </span>
                </div>
            </div>

            <div class="publish-box" id="publish-section" style="display: none;">
                <h2>Tu Opinión</h2>
                <form id="forum-form">
                    <textarea id="opinion-text" placeholder="Escribe aquí..." required></textarea>
                    <button type="submit">Publicar</button>
                </form>
            </div>

            <div class="login-alert" id="login-prompt" style="display: none;">
                <p>Inicia sesión con tu cuenta para comentar.</p>
                <button id="btn-trigger-login">Iniciar Sesión / Registrarse</button>
            </div>

            <div class="opinions-feed" id="opinions-container">
                <div class="no-opinions">Cargando la base de datos de opiniones...</div>
            </div>

        </div>
    </div>
</div>

<div class="modal" id="auth-modal">
    <div class="modal-content">
        <div class="window-header">
            <div class="window-dots">
                <span class="dot close" id="close-modal" style="cursor: pointer;"></span>
                <span class="dot minimize"></span>
                <span class="dot maximize"></span>
            </div>
            <div class="window-title" id="modal-window-title">Acceso</div>
            <div class="window-spacer"></div>
        </div>
        <div class="modal-body">
            <h3 id="modal-title">Iniciar Sesión</h3>
            <form id="auth-form">
                <div class="input-group hidden" id="username-container">
                    <label for="auth-username">Nombre de Usuario (3-20, sin espacios)</label>
                    <input type="text" id="auth-username" maxlength="20" placeholder="tu_usuario">
                    <p style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">Va a ser tu URL: reztored.online/tu_usuario</p>
                </div>
                <div class="input-group">
                    <label for="auth-email">Correo Electrónico</label>
                    <input type="email" id="auth-email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="input-group">
                    <label for="auth-password">Contraseña</label>
                    <input type="password" id="auth-password" required placeholder="••••••••">
                </div>
                
                <div class="modal-actions">
                    <button type="submit" class="btn-full" id="btn-submit-auth">Ingresar</button>
                    <button type="button" class="btn-full btn-google" id="btn-google">Ingresar con Google</button>
                </div>
            </form>

            <div id="auth-message" class="text-message hidden"></div>

            <p class="modal-footer-text">
                <span id="toggle-text">¿No tenés cuenta?</span> 
                <a href="#" id="btn-toggle-auth">Registrate</a>
            </p>
        </div>
    </div>
</div>

<script type="module">
    import {
        auth,
        db,
        googleProvider,
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
        signInWithPopup,
        registrarUsuario
    } from '../reztored-auth.js';

    // Firestore (solo lo que esta página usa además del módulo compartido)
    import {
        collection,
        addDoc,
        query,
        orderBy,
        onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let modoLogin = true;

    // --- REFERENCIAS DEL DOM (MODAL Y AUTH) ---
    const authModal = document.getElementById('auth-modal');
    const btnLoginMenu = document.getElementById('btn-login-menu');
    const btnTriggerLogin = document.getElementById('btn-trigger-login');
    const closeModal = document.getElementById('close-modal');
    const authForm = document.getElementById('auth-form');
    const modalTitle = document.getElementById('modal-title');
    const btnSubmitAuth = document.getElementById('btn-submit-auth');
    const btnToggleAuth = document.getElementById('btn-toggle-auth');
    const toggleText = document.getElementById('toggle-text');
    const authMessage = document.getElementById('auth-message');
    const btnGoogle = document.getElementById('btn-google');

    const usernameContainer = document.getElementById('username-container');
    const authUsernameInput = document.getElementById('auth-username');

    // --- REFERENCIAS DEL DOM (USUARIO LOGUEADO) ---
    const userLoggedInDiv = document.getElementById('user-logged-in');
    const userProfileLink = document.getElementById('user-profile-link');
    const userAvatarMenu = document.getElementById('user-avatar-menu');
    const btnLogout = document.getElementById('btn-logout');

    const publishSection = document.getElementById('publish-section');
    const loginPrompt = document.getElementById('login-prompt');

    // --- EVENTOS DEL MODAL ---
    const abrirModal = () => {
        authModal.classList.add('active');
    };

    if (btnLoginMenu) btnLoginMenu.addEventListener('click', abrirModal);
    if (btnTriggerLogin) btnTriggerLogin.addEventListener('click', abrirModal);

    closeModal.addEventListener('click', () => {
        authModal.classList.remove('active');
        authMessage.classList.add('hidden');
        authForm.reset();
    });

    // Intercambiar entre iniciar sesión y registrarse
    btnToggleAuth.addEventListener('click', (e) => {
        e.preventDefault();
        modoLogin = !modoLogin;
        
        if (modoLogin) {
            modalTitle.textContent = "Iniciar Sesión";
            btnSubmitAuth.textContent = "Ingresar";
            toggleText.textContent = "¿No tenés cuenta?";
            btnToggleAuth.textContent = "Registrate";
            usernameContainer.classList.add('hidden');
            authUsernameInput.removeAttribute('required');
        } else {
            modalTitle.textContent = "Crear Cuenta";
            btnSubmitAuth.textContent = "Registrarse";
            toggleText.textContent = "¿Ya tenés cuenta?";
            btnToggleAuth.textContent = "Inicia Sesión";
            usernameContainer.classList.remove('hidden');
            authUsernameInput.setAttribute('required', 'true');
        }
    });

    // Formulario de login/registro clásico
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const username = authUsernameInput.value.trim();

        mostrarMensaje("Procesando...", "text-gray-300");

        try {
            if (modoLogin) {
                await signInWithEmailAndPassword(auth, email, password);
                mostrarMensaje("¡Sesión iniciada con éxito!", "text-green-400");
                setTimeout(() => {
                    authModal.classList.remove('active');
                }, 1500);
            } else {
                await registrarUsuario({ email, password, username });

                mostrarMensaje("¡Cuenta creada con éxito!", "text-green-400");
                setTimeout(() => {
                    authModal.classList.remove('active');
                    actualizarMenuUsuario(auth.currentUser);
                }, 1500);
            }
            authForm.reset();
        } catch (error) {
            let mensajeError = error.message || "Ocurrió un error.";
            if (error.code === 'auth/weak-password') mensajeError = "La contraseña debe tener mínimo 6 caracteres.";
            if (error.code === 'auth/email-already-in-use') mensajeError = "Ese correo ya está registrado.";
            if (error.code === 'auth/invalid-credential') mensajeError = "Correo o contraseña incorrectos.";
            mostrarMensaje(mensajeError, "text-red-400");
        }
    });

    // Login con Google
    btnGoogle.addEventListener('click', async () => {
        mostrarMensaje("Abriendo ventana de Google...", "text-gray-300");

        try {
            await signInWithPopup(auth, googleProvider);
            mostrarMensaje("¡Sesión iniciada con Google!", "text-green-400");
            setTimeout(() => {
                authModal.classList.remove('active');
            }, 1500);
        } catch (error) {
            console.error(error);
            mostrarMensaje("No se pudo iniciar sesión con Google.", "text-red-400");
        }
    });

    // Cerrar sesión
    btnLogout.addEventListener('click', (e) => {
        e.preventDefault();
        signOut(auth);
    });

    // --- FUNCIONES AUXILIARES ---

    // Actualizar la barra de navegación según el estado de la sesión
    function actualizarMenuUsuario(user) {
        if (user) {
            btnLoginMenu.classList.add('hidden');
            userLoggedInDiv.classList.remove('hidden');
            btnLogout.classList.remove('hidden');
            
            let name = user.displayName || user.email.split('@')[0];
            if (name.length > 20) name = name.substring(0, 20);

            userProfileLink.textContent = name.toUpperCase();
            userProfileLink.href = `/${encodeURIComponent(name)}`;

            if (user.photoURL) {
                userAvatarMenu.src = user.photoURL;
                userAvatarMenu.classList.remove('hidden');
            } else {
                userAvatarMenu.classList.add('hidden');
            }

            // Mostrar el panel de publicar, ocultar el aviso de login
            publishSection.style.display = 'block';
            loginPrompt.style.display = 'none';
        } else {
            btnLoginMenu.classList.remove('hidden');
            userLoggedInDiv.classList.add('hidden');
            btnLogout.classList.add('hidden');
            userProfileLink.textContent = "Mi Perfil";
            userProfileLink.href = "#";
            userAvatarMenu.classList.add('hidden');

            // Ocultar panel de publicar, mostrar aviso de login
            publishSection.style.display = 'none';
            loginPrompt.style.display = 'block';
        }
    }

    // Escuchador de estado de sesión
    onAuthStateChanged(auth, (user) => {
        actualizarMenuUsuario(user);
    });

    // Mostrar mensajes de feedback en el modal
    function mostrarMensaje(texto, claseColor) {
        authMessage.textContent = texto;
        authMessage.className = `text-message ${claseColor}`;
        authMessage.classList.remove('hidden');
    }

    // --- INTEGRACIÓN DE FIRESTORE (BASE DE DATOS REAL EN LA NUBE) ---
    const opinionsCollection = collection(db, 'opinions');
    const opinionsQuery = query(opinionsCollection, orderBy('timestamp', 'desc'));

    // Escuchar en tiempo real los comentarios que entren a Firestore
    onSnapshot(opinionsQuery, (snapshot) => {
        const container = document.getElementById('opinions-container');
        if (snapshot.empty) {
            container.innerHTML = '<div class="no-opinions">No hay opiniones en la nube. ¡Sé el primero!</div>';
            return;
        }

        let opinionsHTML = '';
        snapshot.forEach((doc) => {
            const data = doc.data();
            const author = data.author || 'Anon';
            const avatar = data.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + encodeURIComponent(author);
            const text = data.text || '';
            
            let dateStr = 'Reciente';
            if (data.timestamp) {
                dateStr = data.timestamp.toDate().toLocaleString();
            }

            // Creamos la URL limpia con el formato /usuario
            const linkPerfil = `/${encodeURIComponent(author.toLowerCase())}`;

            opinionsHTML += `
                <div class="opinion-card">
                    <div class="opinion-card-header">
                        <div class="author-meta">
                            <img class="opinion-avatar" src="${avatar}" alt="avatar">
                            <!-- Enlace limpio al perfil del autor -->
                            <a href="${linkPerfil}" class="opinion-author hover:underline text-indigo-400" style="text-decoration: none;">
                                ${escapeHTML(author.toUpperCase())}
                            </a>
                        </div>
                        <span class="opinion-date">${dateStr}</span>
                    </div>
                    <div class="opinion-body">${escapeHTML(text)}</div>
                </div>
            `;
        });
        container.innerHTML = opinionsHTML;
    }, (error) => {
        console.error("Error al leer Firestore: ", error);
        document.getElementById('opinions-container').innerHTML = '<div class="no-opinions" style="color: #ff5f56;">Error al sincronizar con la nube de Firebase. Asegurate de habilitar Firestore Database en modo prueba.</div>';
    });
    // Publicar nueva opinión directamente a Firestore
    document.getElementById('forum-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log("1. Submit disparado");

        const textInput = document.getElementById('opinion-text');
        const text = textInput.value.trim();
        console.log("2. Texto:", text);

        if (!text) {
            console.log("Se cortó: texto vacío");
            return;
        }

        const currentFirebaseUser = auth.currentUser;
        console.log("3. Usuario actual:", currentFirebaseUser);

        if (!currentFirebaseUser) {
            console.log("Se cortó: no hay usuario logueado");
            alert("No has iniciado sesión.");
            return;
        }

        let displayName = currentFirebaseUser.displayName || currentFirebaseUser.email.split('@')[0];
        if (displayName.length > 12) {
            displayName = displayName.substring(0, 12);
        }
        console.log("4. Intentando escribir en Firestore como:", displayName);

        try {
            const docRef = await addDoc(opinionsCollection, {
                author: displayName,
                avatar: currentFirebaseUser.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + encodeURIComponent(displayName),
                text: text,
                timestamp: new Date()
            });
            console.log("5. ¡Éxito! Doc creado con ID:", docRef.id);
            textInput.value = '';
        } catch (error) {
            console.error("5. ERROR al escribir en Firestore:", error.code, error.message);
            alert("No se pudo publicar: " + error.message);
        }
    });

    // --- FUNCIONES AUXILIARES DE ESCAPE ---
    function escapeHTML(str) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        };
        return str.replace(/[&<>'"]/g, tag => map[tag] || tag);
    }

</script>
