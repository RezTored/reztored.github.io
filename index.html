<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Usuario</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-page: #121214;
            --bg-card: #1e1e22;
            --bg-header: #18181c;
            --border-color: #2d2d34;
            --text-main: #e1e1e6;
            --text-muted: #8e8e93;
            --text-white: #ffffff;
            --accent-red: #ff5f56;
            --primary: #4f46e5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-page); 
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-container {
            width: 100%;
            max-width: 500px; 
            padding: 20px;
        }

        .app-window {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        .window-header {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .window-dots { display: flex; gap: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .dot.close { background: #ff5f56; }
        .dot.minimize { background: #ffbd2e; }
        .dot.maximize { background: #27c93f; }

        .window-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .window-spacer { width: 49px; }

        .window-content {
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* --- DISEÑO DEL PERFIL --- */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
        }

        .profile-avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 95, 86, 0.3);
            margin-bottom: 15px;
            background: var(--bg-card);
        }

        .profile-info h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--text-white);
            margin-bottom: 5px;
            letter-spacing: 1.5px;
        }

        .profile-info p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-family: monospace;
            background: #121214;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px dashed var(--border-color);
        }

        /* --- NAVEGACIÓN Y FEED --- */
        .auth-status-bar {
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .auth-status-bar a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .auth-status-bar a:hover {
            color: var(--text-white);
            text-decoration: underline;
        }

        .opinions-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opinion-card {
            background: var(--bg-header);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .opinion-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 6px;
        }

        .opinion-date {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .opinion-body {
            font-size: 0.95rem;
            color: var(--text-main);
            white-space: pre-line;
            letter-spacing: 0.5px;
        }

        .no-opinions {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
        }
        
        .window-content::-webkit-scrollbar { width: 6px; }
        .window-content::-webkit-scrollbar-track { background: var(--bg-card); }
        .window-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="app-window">
        
        <div class="window-header">
            <div class="window-dots">
                <span class="dot close"></span>
                <span class="dot minimize"></span>
                <span class="dot maximize"></span>
            </div>
            <div class="window-title">USER PROFILE</div>
            <div class="window-spacer"></div>
        </div>

        <div class="window-content">
            
            <div class="auth-status-bar">
                <a href="/opinions/index.html" style="color: var(--text-muted);">&lt; VOLVER AL FORO</a>
                <a href="/" id="logo-inicio">INICIO</a>
            </div>

            <!-- Cabecera del Perfil -->
            <div class="profile-header" id="profile-header" style="display: none;">
                <img id="profile-avatar" class="profile-avatar-large" src="" alt="Avatar">
                <div class="profile-info">
                    <h2 id="profile-username">...</h2>
                    <p id="profile-stats">Buscando datos...</p>
                </div>
            </div>

            <!-- Feed de este usuario -->
            <div class="opinions-feed" id="user-opinions-container">
                <div class="no-opinions">Cargando perfil...</div>
            </div>

        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from '../reztored-auth.js';
    import {
        collection,
        query,
        where,
        orderBy,
        onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Extraer el nombre de usuario de la URL de forma segura
    const path = window.location.pathname;
    const targetUsername = decodeURIComponent(path.split('/').pop() || '').trim();

    const container = document.getElementById('user-opinions-container');
    const profileHeader = document.getElementById('profile-header');
    const profileUsername = document.getElementById('profile-username');
    const profileAvatar = document.getElementById('profile-avatar');
    const profileStats = document.getElementById('profile-stats');

    if (!targetUsername || targetUsername === "perfil" || targetUsername === "index.html") {
        container.innerHTML = '<div class="no-opinions" style="color: #ff5f56;">Usuario no encontrado o URL inválida.</div>';
    } else {
        profileHeader.style.display = 'flex';
        profileUsername.textContent = targetUsername.toUpperCase();
        
        // Establecemos un bottt-avatar por defecto usando el seed del usuario
        const defaultAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(targetUsername)}`;
        profileAvatar.src = defaultAvatar;

        // Consultar a Firestore los posts de este usuario
        const opinionsCollection = collection(db, 'opinions');
        const userOpinionsQuery = query(
            opinionsCollection, 
            where('author', '==', targetUsername), 
            orderBy('timestamp', 'desc')
        );

        onSnapshot(userOpinionsQuery, (snapshot) => {
            if (snapshot.empty) {
                profileStats.textContent = "0 POSTS";
                container.innerHTML = '<div class="no-opinions">Este usuario todavía no publicó nada.</div>';
                return;
            }

            profileStats.textContent = `${snapshot.size} POST${snapshot.size !== 1 ? 'S' : ''}`;
            let opinionsHTML = '';
            let avatarSet = false;
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const text = data.text || '';
                
                // 1. Evitamos que el toDate() explote si el timestamp aún es null en local cache
                let dateStr = 'Reciente...';
                if (data.timestamp && typeof data.timestamp.toDate === 'function') {
                    dateStr = data.timestamp.toDate().toLocaleString();
                }

                // 2. Solo usamos el avatar del post más reciente (el primero en el bucle 'desc')
                if (!avatarSet && data.avatar) {
                    profileAvatar.src = data.avatar;
                    avatarSet = true;
                }

                opinionsHTML += `
                    <div class="opinion-card">
                        <div class="opinion-card-header">
                            <span class="opinion-date" style="color: var(--accent-red); font-weight: bold;">[ HISTORIAL ]</span>
                            <span class="opinion-date">${dateStr}</span>
                        </div>
                        <div class="opinion-body">${escapeHTML(text)}</div>
                    </div>
                `;
            });
            container.innerHTML = opinionsHTML;
        }, (error) => {
            console.error("Error consultando el perfil:", error);
            container.innerHTML = '<div class="no-opinions" style="color: #ff5f56;">Error al cargar datos. Asegúrate de tener creado el índice compuesto en Firestore si ordenas y filtras a la vez.</div>';
        });
    }

    function escapeHTML(str) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
        return str.replace(/[&<>'"]/g, tag => map[tag] || tag);
    }
</script>
</body>
</html>
