<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Casino RezTored</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #121214; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            flex-direction: column; 
            margin: 0;
        }
        
        .casino-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 70px); 
            grid-template-rows: repeat(3, 70px); 
            gap: 15px; 
            justify-content: center; 
            margin: 20px 0;
        }
        
        .slot { 
            width: 70px; height: 70px; background: #1e1e22; 
            border: 2px solid #4f46e5; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.2rem;
        }
        
        .ui-text { font-family: 'Rajdhani', sans-serif; font-weight: 700; }
        
        #display-saldo { color: #27c93f; font-weight: 900; }
    </style>
</head>
<body>

    <a href="https://reztored.online">
        <img src="lol.png" alt="Inicio" style="width: 80px; margin-bottom: 10px; border-radius: 50%;">
    </a>

    <div style="display:flex; gap:14px; margin-bottom: 14px;" class="ui-text">
        <a href="/fun" style="color:#9ca3af; font-size:0.85rem; text-decoration:none;">&larr; Volver a FUN</a>
        <a href="/fun/poker" style="color:#8b8bf5; font-size:0.85rem; text-decoration:none;">Ir al Poker →</a>
    </div>

    <div class="ui-text" style="font-size: 1.2rem; margin-bottom: 10px;">
        PetoCoins: <span id="display-saldo">0</span>
    </div>

    <div class="casino-grid">
        <div class="slot" id="s1">🎰</div><div class="slot" id="s2">🎰</div><div class="slot" id="s3">🎰</div>
        <div class="slot" id="s4">🎰</div><div class="slot" id="s5">🎰</div><div class="slot" id="s6">🎰</div>
        <div class="slot" id="s7">🎰</div><div class="slot" id="s8">🎰</div><div class="slot" id="s9">🎰</div>
    </div>

    <div class="controls" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 15px; flex-direction: row-reverse;">
        
        <button id="btn-girar" style="background: #ff5f56; color: white; border: none; padding: 20px 40px; border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.3rem;">
            ¡GIRAR!
        </button>

        <input type="number" id="monto" value="10" style="background: #18181c; border: 1px solid #2d2d34; padding: 15px; color: white; border-radius: 6px; width: 90px; text-align: center; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem;">

    </div>

    <div id="resultado" class="ui-text" style="margin-top: 15px; text-align: center; min-height: 30px;"></div>

    <script type="module">
        import { girarRuleta } from './ruleta.js';
        import { db, auth } from '../../reztored-auth.js';
        import { onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        auth.onAuthStateChanged(user => {
            if (user) {
                onSnapshot(doc(db, 'users', user.uid), (snap) => {
                    document.getElementById('display-saldo').textContent = snap.data().coins || 0;
                });
            }
        });

        const btn = document.getElementById('btn-girar');
        const resDiv = document.getElementById('resultado');

        btn.addEventListener('click', async () => {
            const apuesta = document.getElementById('monto').value;
            btn.disabled = true;
            resDiv.textContent = "Girando...";
            
            try {
                const data = await girarRuleta(apuesta);
                data.resultado.forEach((sim, i) => document.getElementById(`s${i+1}`).textContent = sim);
                
                resDiv.innerHTML = data.multiplicador > 0 
                    ? `<span style="color:#27c93f">🎉 GANASTE x${data.multiplicador}!</span>` 
                    : `<span style="color:#ff5f56">❌ Perdiste...</span>`;
            } catch (e) {
                resDiv.textContent = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
