<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Casino RezTored</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #121214; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .slot-machine { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
        .slot { width: 70px; height: 70px; background: #1e1e22; border: 2px solid #4f46e5; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
        .controls { margin: 30px 0; text-align: center; }
        input { background: #18181c; border: 1px solid #2d2d34; padding: 12px; color: white; border-radius: 6px; width: 100px; text-align: center; font-family: 'Orbitron'; }
        button { background: #4f46e5; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: 700; font-family: 'Orbitron'; margin-left: 10px; }
        #resultado { font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="slot-machine">
        <div class="slot" id="s1">🎰</div>
        <div class="slot" id="s2">🎰</div>
        <div class="slot" id="s3">🎰</div>
    </div>
    <div class="slot-machine">
        <div class="slot" id="s4">🎰</div>
        <div class="slot" id="s5">🎰</div>
        <div class="slot" id="s6">🎰</div>
    </div>

    <div class="controls">
        <input type="number" id="monto" value="10" min="10" max="100">
        <button id="btn-girar">¡GIRAR! 🎰</button>
        <div id="resultado"></div>
    </div>

    <script type="module">
        import { girarRuleta } from './ruleta.js';

        const btn = document.getElementById('btn-girar');
        const resDiv = document.getElementById('resultado');

        btn.addEventListener('click', async () => {
            const apuesta = parseInt(document.getElementById('monto').value);
            resDiv.textContent = "Girando...";
            
            try {
                const data = await girarRuleta(apuesta);
                
                // Actualizar los 6 slots
                data.resultado.forEach((sim, i) => {
                    document.getElementById(`s${i+1}`).textContent = sim;
                });
                
                resDiv.innerHTML = data.multiplicador > 0 
                    ? `<span style="color:#27c93f">🎉 ¡GENIAL! Multiplicador x${data.multiplicador}. Ganaste ${data.ganancia} coins</span>` 
                    : `<span style="color:#ff5f56">❌ Perdiste... intentá de nuevo</span>`;
            } catch (e) {
                resDiv.textContent = "Error: " + e;
            }
        });
    </script>
</body>
</html>
