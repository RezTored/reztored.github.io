<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mecanografía — Petoworks</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Rajdhani', sans-serif; }
  .titulo { font-family: 'Orbitron', sans-serif; }
  .barra-fondo { background: #111827; }
  .barra-relleno { background: linear-gradient(90deg, #22c55e, #16a34a); transition: width .4s ease; }
  #frase-objetivo span.ok { color: #22c55e; }
  #frase-objetivo span.mal { color: #ef4444; text-decoration: underline; }
  #frase-objetivo span.pendiente { color: #6b7280; }
</style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center px-6 py-10">

  <div class="w-full max-w-lg flex items-center justify-between mb-6">
    <a href="/fun/petoworks" class="text-sm text-gray-400 hover:text-gray-200 transition">⬅️ Petoworks</a>
    <span class="flex items-center gap-1.5 bg-gray-900 border border-gray-800 rounded-full pl-1 pr-3 py-1">
      <img src="/petocoin.png" class="h-5 w-5" alt="Petocoin">
      <span class="text-sm font-bold" id="saldo">0</span>
    </span>
  </div>

  <h1 class="titulo text-2xl md:text-3xl font-black mb-1 text-center">⌨️ Mecanografía</h1>
  <p class="text-gray-400 mb-6 text-center max-w-md text-sm">Escribí la frase exactamente como aparece, lo más rápido posible. El pago depende de tu velocidad (palabras por minuto).</p>

  <div class="w-full max-w-lg bg-gray-900 border border-gray-800 rounded-2xl p-4 mb-6">
    <div class="flex justify-between items-center mb-2 text-xs">
      <span class="text-gray-400">Progreso diario de Petoworks</span>
      <span class="font-bold" id="progreso-texto">0 / 2000</span>
    </div>
    <div class="w-full h-2.5 rounded-full overflow-hidden barra-fondo">
      <div class="h-full barra-relleno" id="progreso-barra" style="width:0%"></div>
    </div>
  </div>

  <div class="w-full max-w-lg bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-4">
    <p id="frase-objetivo" class="text-lg font-mono leading-relaxed mb-4"></p>
    <input type="text" id="input-texto" placeholder="Iniciá sesión para trabajar" disabled
      class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none focus:border-green-500 transition font-mono">
  </div>

  <p id="mensaje" class="text-sm text-gray-300 mb-4 text-center max-w-md"></p>

  <button id="btn-nueva" class="px-6 py-3 rounded-xl bg-green-600 hover:bg-green-500 font-bold transition" disabled>Nueva frase</button>

  <script type="module">
    import { auth, ganarPetoworks, suscribirProgresoPetoworks, suscribirCoins, PETOWORKS_LIMITE_DIARIO } from '../../../reztored-auth.js';

    const FRASES = [
      'Soy fan de Bananirou.',
      'Te extraño Isolde, vuelve a mis brazos.',
      'Un mar en calma nunca hizo a un marinero experto.',
      'Las loquitas goticas, son las mejores.',
      'Esta locura, no la traten de entender, no tiene cura.',
      'petope is god, petope is divine, petope is love.',
      'League of legends es un juego de mierda.',
      'Valorant y Counter Strike 2 son mierda.',
      'Deltarune es un buen juego. Att: Nordus.',
      'Solarcraft muerto, server bodrio.',
      'Vivan las goticas culonas y petope',
      'La tecnología avanza más rápido de lo que podemos seguir.',
      'Cada desafío es una oportunidad de aprender algo distinto.',
      'El trabajo en equipo logra cosas que uno solo no puede.',
      'La creatividad no tiene límites cuando se le da espacio.'
    ];

    const fraseEl = document.getElementById('frase-objetivo');
    const inputEl = document.getElementById('input-texto');
    const mensajeEl = document.getElementById('mensaje');
    const saldoEl = document.getElementById('saldo');
    const progresoTexto = document.getElementById('progreso-texto');
    const progresoBarra = document.getElementById('progreso-barra');
    const btnNueva = document.getElementById('btn-nueva');

    let restanteHoy = PETOWORKS_LIMITE_DIARIO;
    let fraseActual = '';
    let horaInicio = 0;
    let empezado = false;
    let terminado = false;

    function calcularPremio(wpm) {
      if (wpm >= 60) return 50;
      if (wpm >= 45) return 35;
      if (wpm >= 30) return 20;
      return 10;
    }

    function pintarFrase(escrito) {
      let html = '';
      for (let i = 0; i < fraseActual.length; i++) {
        const esperado = fraseActual[i];
        if (i >= escrito.length) {
          html += `<span class="pendiente">${esperado}</span>`;
        } else if (escrito[i] === esperado) {
          html += `<span class="ok">${esperado}</span>`;
        } else {
          html += `<span class="mal">${esperado}</span>`;
        }
      }
      fraseEl.innerHTML = html;
    }

    function nuevaFrase() {
      fraseActual = FRASES[Math.floor(Math.random() * FRASES.length)];
      empezado = false;
      terminado = false;
      inputEl.value = '';
      inputEl.disabled = false;
      inputEl.placeholder = 'Empezá a escribir acá...';
      mensajeEl.textContent = '';
      pintarFrase('');
      inputEl.focus();
    }

    async function manejarInput() {
      if (terminado) return;
      const escrito = inputEl.value;

      if (!empezado && escrito.length > 0) {
        empezado = true;
        horaInicio = performance.now();
      }

      pintarFrase(escrito);

      if (escrito === fraseActual) {
        terminado = true;
        inputEl.disabled = true;
        const segundos = (performance.now() - horaInicio) / 1000;
        const palabras = fraseActual.trim().split(/\s+/).length;
        const wpm = Math.round((palabras / segundos) * 60);
        const premio = calcularPremio(wpm);

        if (restanteHoy <= 0) {
          mensajeEl.textContent = `✍️ ${wpm} PPM. Ya llegaste al tope diario de Petoworks, no se acreditó nada.`;
          btnNueva.disabled = true;
          return;
        }

        try {
          const { acreditado, limiteAlcanzado } = await ganarPetoworks(premio);
          mensajeEl.textContent = `✍️ ${wpm} palabras por minuto — Cobraste ${acreditado} petoCoins.${limiteAlcanzado ? ' Llegaste al tope diario.' : ''}`;
          if (limiteAlcanzado) btnNueva.disabled = true;
        } catch (error) {
          mensajeEl.textContent = `⚠️ ${error.message}`;
          btnNueva.disabled = true;
        }
      }
    }

    inputEl.addEventListener('input', manejarInput);
    btnNueva.addEventListener('click', () => {
      if (restanteHoy <= 0) {
        mensajeEl.textContent = 'Ya llegaste al tope diario de Petoworks. Volvé mañana 💤';
        return;
      }
      nuevaFrase();
    });

    let dejarDeEscucharProgreso = () => {};
    let dejarDeEscucharCoins = () => {};

    auth.onAuthStateChanged((user) => {
      dejarDeEscucharProgreso();
      dejarDeEscucharCoins();
      if (!user) {
        saldoEl.textContent = '0';
        progresoTexto.textContent = `0 / ${PETOWORKS_LIMITE_DIARIO}`;
        progresoBarra.style.width = '0%';
        fraseEl.textContent = '';
        inputEl.disabled = true;
        inputEl.placeholder = 'Iniciá sesión para trabajar';
        btnNueva.disabled = true;
        return;
      }
      dejarDeEscucharCoins = suscribirCoins(user.uid, (coins) => {
        saldoEl.textContent = coins;
      });
      dejarDeEscucharProgreso = suscribirProgresoPetoworks(user.uid, ({ ganado, restante }) => {
        restanteHoy = restante;
        progresoTexto.textContent = `${ganado} / ${PETOWORKS_LIMITE_DIARIO}`;
        progresoBarra.style.width = Math.min(100, (ganado / PETOWORKS_LIMITE_DIARIO) * 100) + '%';
      });
      btnNueva.disabled = false;
      nuevaFrase();
    });
  </script>

<script type="module" src="/nivel-widget.js"></script>
</body>
</html>
