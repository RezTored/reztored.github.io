<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-page: #121214;
            --bg-card: #1e1e22;
            --bg-header: #18181c;
            --border-color: #2d2d34;
            --text-main: #e1e1e6;
            --text-muted: #8e8e93;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-page);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page-container { width: 100%; max-width: 480px; }

        .app-window {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        .window-header {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .window-dots { display: flex; gap: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .dot.close { background: #ff5f56; }
        .dot.minimize { background: #ffbd2e; }
        .dot.maximize { background: #27c93f; }

        .window-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .window-home-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 49px;
            height: 22px;
            text-decoration: none;
            opacity: 0.75;
            transition: opacity 0.2s, transform 0.2s;
        }
        .window-home-btn:hover { opacity: 1; transform: scale(1.08); }
        .window-home-btn img { height: 20px; width: auto; display: block; }

        .window-content {
            padding: 30px 24px;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="app-window">
        <div class="window-header">
            <div class="window-dots">
                <span class="dot close"></span>
                <span class="dot minimize"></span>
                <span class="dot maximize"></span>
            </div>
            <div class="window-title">Información</div>
            <a href="/" class="window-home-btn" aria-label="Volver al inicio" title="Volver al inicio">
                <img src="/lol.png" alt="Inicio">
            </a>
        </div>
        <div class="window-content">
            <p>Próximamente más información sobre esta página.</p>
        </div>
    </div>
</div>

<script type="module" src="/nivel-widget.js"></script>
</body>
</html>
